version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: laundryos-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: laundryos
    ports:
      - '5432:5432'
    volumes:
      - laundryos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: laundryos-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/laundryos?schema=public
      JWT_SECRET: local-dev-secret-change-me
      JWT_EXPIRES_IN: 7d
      PORT: 8000
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      PLATFORM_ADMIN_EMAIL: admin@laundryos.dev
      PLATFORM_ADMIN_PASSWORD: Admin@123
    command: sh -c "npx prisma migrate deploy && node dist/prisma/seed.js && node dist/src/main"
    ports:
      - '8000:8000'

  web:
    build: ./frontend
    container_name: laundryos-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - '3000:3000'

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: laundryos-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@laundryos.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - db

volumes:
  laundryos_pgdata:
